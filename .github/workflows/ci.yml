name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  changes:
    name: Detect changed areas
    runs-on: ubuntu-latest

    outputs:
      api: ${{ steps.filter.outputs.api }}
      android_app: ${{ steps.filter.outputs.android_app }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Detect changed areas
        uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            api:
              - 'src/**'
            android_app:
              - 'mobile/android/**'

  required-checks-gate:
    name: Required Checks Gate
    runs-on: ubuntu-latest
    needs: changes
    if: always()

    steps:
      - name: Verify required checks
        env:
          API_CHANGED: ${{ needs.changes.outputs.api }}
          ANDROID_CHANGED: ${{ needs.changes.outputs.android_app }}
        run: |
          set -eu

          if [ "$API_CHANGED" = "true" ]; then
            npm ci
            npm run build
            npm run test:coverage

            DB_INIT_SKIP_DOCKER=1 npm run db:init -- --env .env.test
            npm run test:integration -- --verbose

            npm run lint
          fi

          if [ "$ANDROID_CHANGED" = "true" ]; then
            ./gradlew --no-daemon :app:assembleDebug

            cat > /tmp/run-android-maestro.sh <<'SH'
            set -eu

            run_maestro() {
              flow="$1"
              for attempt in 1 2; do
                echo "Running $flow (attempt $attempt)"
                if timeout -k 30 420 maestro test --no-ansi "$flow"; then
                  return 0
                fi
                if [ "$attempt" -eq 2 ]; then
                  return 1
                fi
                adb devices || true
                adb kill-server
                adb start-server
                adb wait-for-device
                adb shell cmd package list packages >/dev/null
              done
            }

            run_maestro mobile/android/maestro/us1-signin.yaml
            run_maestro mobile/android/maestro/us2-guide.yaml
            run_maestro mobile/android/maestro/us3-login.yaml
            run_maestro mobile/android/maestro/us4-capture-or-history.yaml
            run_maestro mobile/android/maestro/us4-permission-recovery.yaml
            run_maestro mobile/android/maestro/us5-history-filter.yaml
            run_maestro mobile/android/maestro/us6-measurement-detail.yaml
            SH
            chmod +x /tmp/run-android-maestro.sh

            set -a
            . ./.env.test
            set +a
            npm run api > /tmp/bpt-api.log 2>&1 &
            for attempt in $(seq 1 60); do
              if curl --silent http://127.0.0.1:3000/api/v1/measurements >/dev/null; then
                break
              fi
              if [ "$attempt" -eq 60 ]; then
                cat /tmp/bpt-api.log
                exit 1
              fi
              sleep 2

                services:
                  postgres:
                    image: postgres:17-alpine
                    env:
                      POSTGRES_USER: postgres
                      POSTGRES_PASSWORD: postgres
                      POSTGRES_DB: blood_pressure_tracker_test
                    ports:
                      - 5433:5432
                    options: >-
                      --health-cmd "pg_isready -U postgres"
                      --health-interval 10s
                      --health-timeout 5s
                      --health-retries 5

                env:
                  API_CHANGED: ${{ needs.changes.outputs.api }}
                  ANDROID_CHANGED: ${{ needs.changes.outputs.android_app }}
            done

                  - name: Check out repository
                    uses: actions/checkout@v4

                  - name: Set up Node.js
                    uses: actions/setup-node@v4
                    with:
                      node-version: 24
                      cache: npm

                  - name: Set up JDK
                    uses: actions/setup-java@v4
                    with:
                      distribution: temurin
                      java-version: '17'

                  - name: Set up Android SDK
                    uses: android-actions/setup-android@v3

                  - name: Install dependencies
                    run: npm ci

                  - name: Build
                    if: env.API_CHANGED == 'true'
                    run: npm run build

                  - name: Coverage
                    if: env.API_CHANGED == 'true'
                    run: npm run test:coverage

                  - name: Initialize integration database
                    if: env.API_CHANGED == 'true'
                    env:
                      DB_INIT_SKIP_DOCKER: '1'
                    run: npm run db:init -- --env .env.test

                  - name: Integration tests
                    if: env.API_CHANGED == 'true'
                    run: npm run test:integration -- --verbose

                  - name: Lint
                    if: env.API_CHANGED == 'true'
                    run: npm run lint

                  - name: Enable KVM for Android emulator
                    if: env.ANDROID_CHANGED == 'true'
                    run: |
                      echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
                      sudo udevadm control --reload-rules
                      sudo udevadm trigger --name-match=kvm

                  - name: Bootstrap Android Maestro fixtures
                    if: env.ANDROID_CHANGED == 'true'
                    run: npx jest --runInBand --runTestsByPath tests/bootstrap/android-ci-bootstrap.test.ts

                  - name: Build Android debug APK
                    if: env.ANDROID_CHANGED == 'true'
                    run: ./gradlew --no-daemon :app:assembleDebug
                    working-directory: mobile/android

                  - name: Install Maestro
                    if: env.ANDROID_CHANGED == 'true'
                    run: |
                      curl -Ls "https://get.maestro.mobile.dev" | bash
                      echo "$HOME/.maestro/bin" >> "$GITHUB_PATH"

                  - name: Start API
                    if: env.ANDROID_CHANGED == 'true'
                    run: |
                      set -a
                      . ./.env.test
                      set +a
                      npm run api > /tmp/bpt-api.log 2>&1 &
                      for attempt in $(seq 1 60); do
                        if curl --silent http://127.0.0.1:3000/api/v1/measurements >/dev/null; then
                          exit 0
                        fi
                        if [ "$attempt" -eq 60 ]; then
                          cat /tmp/bpt-api.log
                          exit 1
                        fi
                        sleep 2
                      done

                  - name: Android unit tests and coverage
                    if: env.ANDROID_CHANGED == 'true'
                    run: ./gradlew --no-daemon :app:testDebugUnitTest :app:androidCoverageVerify
                    working-directory: mobile/android

                  - name: Maestro happy paths
                    if: env.ANDROID_CHANGED == 'true'
                    uses: reactivecircus/android-emulator-runner@v2
                    timeout-minutes: 25
                    env:
                      MAESTRO_CLI_NO_ANALYTICS: '1'
                      MAESTRO_DRIVER_STARTUP_TIMEOUT: '300000'
                    with:
                      api-level: 30
                      target: google_apis
                      arch: x86_64
                      profile: pixel_6
                      emulator-boot-timeout: 1200
                      disable-animations: true
                      emulator-options: -no-window -gpu swiftshader_indirect -no-snapshot -noaudio -no-boot-anim -camera-back emulated
                      script: |
                        set -eu
                        adb wait-for-device
                        adb shell cmd package list packages >/dev/null
                        adb shell input keyevent KEYCODE_WAKEUP || true
                        adb shell wm dismiss-keyguard || true
                        adb shell settings put global window_animation_scale 0 || true
                        adb shell settings put global transition_animation_scale 0 || true
                        adb shell settings put global animator_duration_scale 0 || true
                        adb install -r mobile/android/app/build/outputs/apk/debug/app-debug.apk

                        cat > /tmp/run-android-maestro.sh <<'SH'
                        set -eu

                        run_maestro() {
                          flow="$1"
                          for attempt in 1 2; do
                            echo "Running $flow (attempt $attempt)"
                            if timeout -k 30 420 maestro test --no-ansi "$flow"; then
                              return 0
                            fi
                            if [ "$attempt" -eq 2 ]; then
                              return 1
                            fi
                            adb devices || true
                            adb kill-server
                            adb start-server
                            adb wait-for-device
                            adb shell cmd package list packages >/dev/null
                          done
                        }

                        run_maestro mobile/android/maestro/us1-signin.yaml
                        run_maestro mobile/android/maestro/us2-guide.yaml
                        run_maestro mobile/android/maestro/us3-login.yaml
                        run_maestro mobile/android/maestro/us4-capture-or-history.yaml
                        run_maestro mobile/android/maestro/us4-permission-recovery.yaml
                        run_maestro mobile/android/maestro/us5-history-filter.yaml
                        run_maestro mobile/android/maestro/us6-measurement-detail.yaml
                        SH
                        chmod +x /tmp/run-android-maestro.sh
                        /tmp/run-android-maestro.sh
