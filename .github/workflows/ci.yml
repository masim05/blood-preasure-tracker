name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

  unit-contract-coverage:
    name: Unit/Contract Coverage
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Coverage
        run: npm run test:coverage

  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: blood_pressure_tracker_test
        ports:
          - 5433:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Initialize integration database
        env:
          DB_INIT_SKIP_DOCKER: '1'
        run: npm run db:init -- --env .env.test

      - name: Integration tests
        run: npm run test:integration -- --verbose

  lint:
    name: Lint
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

  android-mobile:
    name: Android Mobile Tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: blood_pressure_tracker_test
        ports:
          - 5433:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install API dependencies
        run: npm ci

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Enable KVM for Android emulator
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Initialize Android test database
        env:
          DB_INIT_SKIP_DOCKER: '1'
        run: npm run db:init -- --env .env.test

      - name: Bootstrap Android Maestro fixtures
        run: npx jest --runInBand --runTestsByPath tests/bootstrap/android-ci-bootstrap.test.ts

      - name: Android unit tests, coverage, and build
        run: ./gradlew --no-daemon :app:testDebugUnitTest :app:androidCoverageVerify :app:assembleDebug
        working-directory: mobile/android

      - name: Install Maestro
        run: |
          curl -Ls "https://get.maestro.mobile.dev" | bash
          echo "$HOME/.maestro/bin" >> "$GITHUB_PATH"

      - name: Prepare Maestro runner
        run: |
          cat > /tmp/run-android-maestro.sh <<'SH'
          set -eu

          run_maestro() {
            flow="$1"
            for attempt in 1 2; do
              echo "Running $flow (attempt $attempt)"
              if timeout -k 30 420 maestro test --no-ansi "$flow"; then
                return 0
              fi
              if [ "$attempt" -eq 2 ]; then
                return 1
              fi
              adb devices || true
              adb kill-server
              adb start-server
              adb wait-for-device
              adb shell cmd package list packages >/dev/null
            done
          }

          run_maestro mobile/android/maestro/us1-signin.yaml
          run_maestro mobile/android/maestro/us2-guide.yaml
          run_maestro mobile/android/maestro/us3-login.yaml
          run_maestro mobile/android/maestro/us4-capture-or-history.yaml
          run_maestro mobile/android/maestro/us4-permission-recovery.yaml
          run_maestro mobile/android/maestro/us5-history-filter.yaml
          run_maestro mobile/android/maestro/us6-measurement-detail.yaml
          SH
          chmod +x /tmp/run-android-maestro.sh

      - name: Start API
        run: |
          set -a
          . ./.env.test
          set +a
          npm run api > /tmp/bpt-api.log 2>&1 &
          for attempt in $(seq 1 60); do
            if curl --silent http://127.0.0.1:3000/api/v1/measurements >/dev/null; then
              exit 0
            fi
            sleep 2
          done
          cat /tmp/bpt-api.log
          exit 1

      - name: Maestro happy paths
        uses: reactivecircus/android-emulator-runner@v2
        timeout-minutes: 25
        env:
          MAESTRO_CLI_NO_ANALYTICS: '1'
          MAESTRO_DRIVER_STARTUP_TIMEOUT: '300000'
        with:
          api-level: 30
          target: google_apis
          arch: x86_64
          profile: pixel_6
          emulator-boot-timeout: 1200
          disable-animations: true
          emulator-options: -no-window -gpu swiftshader_indirect -no-snapshot -noaudio -no-boot-anim -camera-back emulated
          script: |
            set -eu
            adb wait-for-device
            adb shell cmd package list packages >/dev/null
            adb shell input keyevent KEYCODE_WAKEUP || true
            adb shell wm dismiss-keyguard || true
            adb shell settings put global window_animation_scale 0 || true
            adb shell settings put global transition_animation_scale 0 || true
            adb shell settings put global animator_duration_scale 0 || true
            adb install -r mobile/android/app/build/outputs/apk/debug/app-debug.apk
            /tmp/run-android-maestro.sh
