appId: com.masim05.bloodpressure.mobile
---
- launchApp:
    clearState: true
- tapOn:
    id: auth_mode_login
- tapOn:
    id: login_email
- inputText: us5@example.com
- hideKeyboard
- tapOn:
    id: login_password
- inputText: password123
- hideKeyboard
- tapOn:
    id: login_submit
- assertVisible:
    id: bottom_nav_history
- evalScript: |
    var loginRes = http.post('http://127.0.0.1:3000/api/v1/login', {
      body: JSON.stringify({email: 'us5@example.com', password: 'password123'}),
      headers: {'Content-Type': 'application/json'}
    });
    if (!loginRes.ok) throw new Error('POST /api/v1/login: expected 2xx, got ' + loginRes.status);
    var token = json(loginRes.body).accessToken;
    var histRes = http.get('http://127.0.0.1:3000/api/v1/measurements', {
      headers: {Authorization: 'Bearer ' + token}
    });
    if (!histRes.ok) throw new Error('GET /api/v1/measurements: expected 2xx, got ' + histRes.status);
    var detailRes = http.get('http://127.0.0.1:3000/api/v1/measurements/msr_maestro_us5', {
      headers: {Authorization: 'Bearer ' + token}
    });
    if (!detailRes.ok) throw new Error('GET /api/v1/measurements/msr_maestro_us5: expected 2xx, got ' + detailRes.status);
- tapOn:
    id: bottom_nav_history
- assertVisible:
    id: history_row
- tapOn:
    id: history_row
- assertVisible:
    id: measurement_detail_screen
- assertVisible:
    id: measurement_detail_image
- tapOn:
    id: measurement_detail_systolic
- eraseText
- inputText: "121"
- hideKeyboard
- tapOn:
    id: measurement_detail_save
- tapOn:
    id: measurement_detail_back
    optional: true
- assertVisible:
    id: history_apply_filter
- tapOn:
    id: history_row
- assertVisible:
    id: measurement_detail_screen
- assertVisible:
    id: measurement_detail_systolic
