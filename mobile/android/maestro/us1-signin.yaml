appId: com.masim05.bloodpressure.mobile
---
- runScript:
    file: scripts/generate-signup-creds.js
- launchApp:
    clearState: true
- tapOn:
    id: auth_mode_new_account
- tapOn:
    id: signin_email
- inputText: ${output.signupEmail}
- hideKeyboard
- tapOn:
    id: signin_password
- inputText: ${output.signupPassword}
- hideKeyboard
- tapOn:
    id: signin_submit
- assertVisible:
    id: guide_screen
- runScript:
    file: scripts/assert-signup-created-user.js
- tapOn:
    id: guide_continue
- assertVisible:
    id: camera_upload
- stopApp
- launchApp
- assertVisible:
    id: camera_screen
