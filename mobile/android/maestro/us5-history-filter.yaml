appId: com.masim05.bloodpressure.mobile
---
- launchApp:
    clearState: true
- tapOn:
    id: auth_mode_login
- tapOn:
    id: login_email
- inputText: us5@example.com
- hideKeyboard
- tapOn:
    id: login_password
- inputText: password123
- hideKeyboard
- tapOn:
    id: login_submit
- evalScript: |
    var resp = http.post('http://localhost:3000/api/v1/login', {
      body: JSON.stringify({email: 'us5@example.com', password: 'password123'}),
      headers: {'Content-Type': 'application/json'}
    });
    if (resp.status !== 201) throw new Error('Login API call format check failed with status: ' + resp.status);
    var body = JSON.parse(resp.body);
    if (typeof body.accessToken !== 'string' || body.accessToken.length === 0) throw new Error('Login API response missing accessToken field');
    if (body.tokenType !== 'Bearer') throw new Error('Login API response tokenType is not Bearer');
    if (typeof body.expiresAt !== 'string' || body.expiresAt.length === 0) throw new Error('Login API response missing expiresAt field');
    if (!body.user || typeof body.user.id !== 'string' || typeof body.user.email !== 'string') throw new Error('Login API response user object is invalid');
    output.token = body.tokenType + ' ' + body.accessToken;
- assertVisible:
    id: bottom_nav_history
- tapOn:
    id: bottom_nav_history
- evalScript: |
    var resp = http.get('http://localhost:3000/api/v1/measurements?page=1&pageSize=20', {
      headers: {'Authorization': output.token}
    });
    if (resp.status !== 200) throw new Error('History API call format check failed with status: ' + resp.status);
    var body = JSON.parse(resp.body);
    if (!Array.isArray(body.items)) throw new Error('History API response missing items array');
    if (typeof body.page !== 'number') throw new Error('History API response missing page field');
    if (typeof body.pageSize !== 'number') throw new Error('History API response missing pageSize field');
    if (typeof body.hasNextPage !== 'boolean') throw new Error('History API response missing hasNextPage field');
    if (!body.filters || typeof body.filters !== 'object') throw new Error('History API response missing filters field');
- tapOn:
    id: history_from
- tapOn:
    text: OK
- tapOn:
    id: history_to
- tapOn:
    text: OK
- tapOn:
    id: history_apply_filter
- evalScript: |
    var from = '2026-05-27T00:00:00.000Z';
    var to = '2026-05-27T23:59:59.999Z';
    var resp = http.get('http://localhost:3000/api/v1/measurements?page=1&pageSize=20&from=' + encodeURIComponent(from) + '&to=' + encodeURIComponent(to), {
      headers: {'Authorization': output.token}
    });
    if (resp.status !== 200) throw new Error('History filter API call format check failed with status: ' + resp.status);
    var body = JSON.parse(resp.body);
    if (!Array.isArray(body.items)) throw new Error('History filter API response missing items array');
    if (typeof body.page !== 'number') throw new Error('History filter API response missing page field');
    if (typeof body.pageSize !== 'number') throw new Error('History filter API response missing pageSize field');
    if (typeof body.hasNextPage !== 'boolean') throw new Error('History filter API response missing hasNextPage field');
    if (!body.filters || typeof body.filters !== 'object') throw new Error('History filter API response missing filters field');
    if (typeof body.filters.from !== 'string') throw new Error('History filter API response filters missing from field');
    if (typeof body.filters.to !== 'string') throw new Error('History filter API response filters missing to field');
    if (!body.items[0] || typeof body.items[0].id !== 'string' || body.items[0].id.length === 0) throw new Error('History filter API response missing first measurement id');
    output.selectedMeasurementId = body.items[0].id;
- assertVisible:
    text: "120"
- assertVisible:
    text: "80"
- assertVisible:
    text: "68"
- tapOn:
    id: history_row
- assertVisible:
    id: measurement_detail_screen
- evalScript: |
    var resp = http.get('http://localhost:3000/api/v1/measurements/' + output.selectedMeasurementId, {
      headers: {'Authorization': output.token}
    });
    if (resp.status !== 200) throw new Error('Measurement detail API call format check failed with status: ' + resp.status);
    var body = JSON.parse(resp.body);
    if (typeof body.id !== 'string' || body.id.length === 0) throw new Error('Measurement detail API response missing id field');
    if (body.id !== output.selectedMeasurementId) throw new Error('Measurement detail API response id does not match selected history item');
    if (typeof body.status !== 'string' || body.status.length === 0) throw new Error('Measurement detail API response missing status field');
    if (typeof body.measurementTime !== 'string' || body.measurementTime.length === 0) throw new Error('Measurement detail API response missing measurementTime field');
    if (typeof body.imageUrl !== 'string' || body.imageUrl.length === 0) throw new Error('Measurement detail API response missing imageUrl field');
- tapOn:
    id: measurement_detail_back
- assertVisible:
    id: history_apply_filter
- assertNotVisible:
    id: camera_upload
- assertVisible:
    id: history_export_csv
- tapOn:
    id: history_export_csv