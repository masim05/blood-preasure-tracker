appId: com.masim05.bloodpressure.mobile
---
- launchApp:
    clearState: true
- tapOn:
    id: com.masim05.bloodpressure.mobile:id/signin_to_login
- tapOn:
    id: com.masim05.bloodpressure.mobile:id/login_email
- inputText: us5@example.com
- tapOn:
    id: com.masim05.bloodpressure.mobile:id/login_password
- inputText: password123
- tapOn:
    id: com.masim05.bloodpressure.mobile:id/login_submit
- assertVisible:
    id: com.masim05.bloodpressure.mobile:id/actions_history
- tapOn:
    id: com.masim05.bloodpressure.mobile:id/actions_history
- tapOn:
    id: com.masim05.bloodpressure.mobile:id/history_from
- inputText: 2026-05-01
- tapOn:
    id: com.masim05.bloodpressure.mobile:id/history_to
- inputText: 2026-05-31
- tapOn:
    id: com.masim05.bloodpressure.mobile:id/history_apply_filter
- assertVisible:
    text: .*120.*80.*68.*
- assertNotVisible:
    id: com.masim05.bloodpressure.mobile:id/capture_open_camera