appId: com.masim05.bloodpressure.mobile
---
- launchApp:
    clearState: true
- tapOn:
    id: auth_mode_login
- tapOn:
    id: login_email
- inputText: us3@example.com
- hideKeyboard
- tapOn:
    id: login_password
- inputText: password123
- hideKeyboard
- tapOn:
    id: login_submit
- assertVisible:
    id: camera_upload
- assertVisible:
    id: bottom_nav_history
- evalScript: |
    var res = http.post('http://127.0.0.1:3000/api/v1/login', {
      body: JSON.stringify({email: 'us3@example.com', password: 'password123'}),
      headers: {'Content-Type': 'application/json'}
    });
    if (!res.ok) throw new Error('POST /api/v1/login: expected 2xx, got ' + res.status);