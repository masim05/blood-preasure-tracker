appId: com.masim05.bloodpressure.mobile
---
- launchApp:
    clearState: true
- tapOn:
    id: com.masim05.bloodpressure.mobile:id/signin_to_login
- tapOn:
    id: com.masim05.bloodpressure.mobile:id/login_email
- inputText: us3@example.com
- tapOn:
    id: com.masim05.bloodpressure.mobile:id/login_password
- inputText: password123
- tapOn:
    id: com.masim05.bloodpressure.mobile:id/login_submit
- assertVisible:
    id: com.masim05.bloodpressure.mobile:id/actions_capture
- assertVisible:
    id: com.masim05.bloodpressure.mobile:id/actions_history