appId: com.masim05.bloodpressure.mobile
---
- launchApp:
    clearState: true
- tapOn:
    id: auth_mode_new_account
- tapOn:
    id: signin_email
- inputRandomEmail
- hideKeyboard
- tapOn:
    id: signin_password
- inputText: password123
- hideKeyboard
- tapOn:
    id: signin_submit
- assertVisible:
    id: guide_screen
- evalScript: |
    var res = http.post('http://127.0.0.1:3000/api/v1/signin', {
      body: JSON.stringify({email: 'assert-' + Date.now() + '@example.com', password: 'password123'}),
      headers: {'Content-Type': 'application/json'}
    });
    if (!res.ok) throw new Error('POST /api/v1/signin: expected 2xx, got ' + res.status);
- tapOn:
    id: guide_continue
- tapOn:
    text: (Deny|Don't allow|Not now)
    optional: true
- assertVisible:
    id: camera_open_settings
    optional: true
- assertVisible:
    id: bottom_nav_history
- tapOn:
    id: bottom_nav_history
- assertVisible:
    id: history_screen
