appId: com.masim05.bloodpressure.mobile
---
- launchApp:
    clearState: true
- tapOn:
    id: auth_mode_new_account
- tapOn:
    id: signin_email
- evalScript: |
    output.signinEmail = 'maestrotest_' + Date.now() + '@test.example.com';
- inputText: ${output.signinEmail}
- hideKeyboard
- tapOn:
    id: signin_password
- inputText: password123
- hideKeyboard
- tapOn:
    id: signin_submit
- evalScript: |
    var resp = http.post('http://localhost:3000/api/v1/signin', {
      body: JSON.stringify({email: output.signinEmail, password: 'password123'}),
      headers: {'Content-Type': 'application/json'}
    });
    if (resp.status !== 201) throw new Error('Signin API call format check failed with status: ' + resp.status);
    var body = JSON.parse(resp.body);
    if (typeof body.accessToken !== 'string' || body.accessToken.length === 0) throw new Error('Signin API response missing accessToken field');
    if (body.tokenType !== 'Bearer') throw new Error('Signin API response tokenType is not Bearer');
    if (typeof body.expiresAt !== 'string' || body.expiresAt.length === 0) throw new Error('Signin API response missing expiresAt field');
    if (!body.user || typeof body.user.id !== 'string' || typeof body.user.email !== 'string') throw new Error('Signin API response user object is invalid');
    output.token = body.tokenType + ' ' + body.accessToken;
- assertVisible:
    id: guide_screen
- tapOn:
    id: guide_continue
- tapOn:
    text: (Deny|Don't allow|Not now)
    optional: true
- assertVisible:
    id: camera_open_settings
    optional: true
- assertVisible:
    id: bottom_nav_history
- tapOn:
    id: bottom_nav_history
- assertVisible:
    id: history_screen
- evalScript: |
    var resp = http.get('http://localhost:3000/api/v1/measurements?page=1&pageSize=20', {
      headers: {'Authorization': output.token}
    });
    if (resp.status !== 200) throw new Error('History API call format check failed with status: ' + resp.status);
    var body = JSON.parse(resp.body);
    if (!Array.isArray(body.items)) throw new Error('History API response missing items array');
    if (typeof body.page !== 'number') throw new Error('History API response missing page field');
    if (typeof body.pageSize !== 'number') throw new Error('History API response missing pageSize field');
    if (typeof body.hasNextPage !== 'boolean') throw new Error('History API response missing hasNextPage field');
    if (!body.filters || typeof body.filters !== 'object') throw new Error('History API response missing filters field');
    if (body.items.length !== 0) throw new Error('History API response expected no measurements for newly created account');
