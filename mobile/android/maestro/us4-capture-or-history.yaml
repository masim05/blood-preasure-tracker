appId: com.masim05.bloodpressure.mobile
---
- launchApp:
    clearState: true
- tapOn:
    id: auth_mode_login
- tapOn:
    id: login_email
- inputText: us4@example.com
- hideKeyboard
- tapOn:
    id: login_password
- inputText: password123
- hideKeyboard
- tapOn:
    id: login_submit
- tapOn:
    text: (While using the app|Only this time|Allow)
    optional: true
- assertVisible:
    id: camera_preview
- assertVisible:
    id: camera_upload
- assertVisible:
    id: camera_history
- tapOn:
    id: camera_history
- assertVisible:
    id: history_table