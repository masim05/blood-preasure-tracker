appId: com.masim05.bloodpressure.mobile
---
- launchApp:
    clearState: true
- tapOn:
    id: auth_mode_login
- tapOn:
    id: login_email
- inputText: us4@example.com
- hideKeyboard
- tapOn:
    id: login_password
- inputText: password123
- hideKeyboard
- tapOn:
    id: login_submit
- tapOn:
    text: (While using the app|Only this time|Allow)
    optional: true
- assertVisible:
    id: bottom_nav_history
- tapOn:
    id: bottom_nav_history
- assertVisible:
    id: history_table
- evalScript: |
    var loginRes = http.post('http://127.0.0.1:3000/api/v1/login', {
      body: JSON.stringify({email: 'us4@example.com', password: 'password123'}),
      headers: {'Content-Type': 'application/json'}
    });
    if (!loginRes.ok) throw new Error('POST /api/v1/login: expected 2xx, got ' + loginRes.status);
    var token = json(loginRes.body).accessToken;
    var histRes = http.get('http://127.0.0.1:3000/api/v1/measurements', {
      headers: {Authorization: 'Bearer ' + token}
    });
    if (!histRes.ok) throw new Error('GET /api/v1/measurements: expected 2xx, got ' + histRes.status);